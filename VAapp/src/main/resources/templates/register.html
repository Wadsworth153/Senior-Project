<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layouts :: layout(~{::title}, ~{::content})">

<head>
    <title>Create Account</title>
</head>

<body>

<div th:fragment="content">

<h1>Create Veteran Account</h1>

<div class="card">

<form th:action="@{/register}" th:object="${form}" method="post">

    <h2>Login Information</h2>

    Username:
    <input type="text" th:field="*{username}"><br><br>

    Password:
    <input type="password" th:field="*{password}"><br><br>

    Confirm Password:
    <input type="password" th:field="*{confirmPassword}"><br><br>

    <h2>Veteran Information</h2>

    First Name:
    <input type="text" th:field="*{firstName}"><br><br>

    Last Name:
    <input type="text" th:field="*{lastName}"><br><br>

    Email:
    <input type="email" th:field="*{email}"><br><br>

    Date of Birth:
    <input type="date" th:field="*{dateOfBirth}"><br><br>

    Branch of Service:
    <input type="text" th:field="*{branchOfService}"><br><br>

    Service Start Date:
    <input type="date" th:field="*{serviceStartDate}"><br><br>

    Service End Date:
    <input type="date" th:field="*{serviceEndDate}"><br><br>

    Discharge Status:
    <input type="text" th:field="*{dischargeStatus}"><br><br>

    <button class="button" type="submit">Create Account</button>

</form>

</div>

</div>

</body>
</html>
